name: Build ExplorerUp

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install AutoHotkey v2
        run: choco install autohotkey --version=2.0.24 -y
        shell: pwsh

      - name: Compile with Ahk2Exe
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $candidates = @(
            "C:\Program Files\AutoHotkey\Compiler\Ahk2Exe.exe",
            "C:\Program Files\AutoHotkey\v2\Compiler\Ahk2Exe.exe",
            "C:\Program Files (x86)\AutoHotkey\Compiler\Ahk2Exe.exe",
            "C:\Program Files (x86)\AutoHotkey\v2\Compiler\Ahk2Exe.exe",
            "$env:LocalAppData\Programs\AutoHotkey\Compiler\Ahk2Exe.exe",
            "$env:LocalAppData\Programs\AutoHotkey\v2\Compiler\Ahk2Exe.exe"
          )

          $ahk2exe = @(Get-Command Ahk2Exe.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source -ErrorAction SilentlyContinue) + $candidates |
            Where-Object { $_ -and (Test-Path $_) } |
            Select-Object -First 1

          if (-not $ahk2exe) {
            throw "Ahk2Exe.exe was not found. Checked: $($candidates -join ', ')"
          }

          Write-Host "Using Ahk2Exe: $ahk2exe"
          & $ahk2exe /in src\ExplorerUp.ahk /out dist\ExplorerUp.exe /compress 2
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExplorerUp
          path: dist/ExplorerUp.exe
          if-no-files-found: error

      # タグ push 時のみ GitHub Release を作成して EXE を添付
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ExplorerUp.exe
          generate_release_notes: true
