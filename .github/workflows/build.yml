name: Build ExplorerUp

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest
    env:
      AHK_VERSION: 2.0.26
      AHK2EXE_TAG: Ahk2Exe1.1.37.02a2

    steps:
      - uses: actions/checkout@v4

      - name: Download AutoHotkey toolchain
        run: |
          $toolRoot = Join-Path $env:RUNNER_TEMP "autohotkey"
          $compilerDir = Join-Path $toolRoot "Compiler"
          $ahkZip = Join-Path $env:RUNNER_TEMP "AutoHotkey_$env:AHK_VERSION.zip"
          $ahk2exeZip = Join-Path $env:RUNNER_TEMP "$env:AHK2EXE_TAG.zip"

          Remove-Item -Recurse -Force $toolRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $compilerDir | Out-Null

          Invoke-WebRequest -Uri "https://github.com/AutoHotkey/AutoHotkey/releases/download/v$env:AHK_VERSION/AutoHotkey_$env:AHK_VERSION.zip" -OutFile $ahkZip
          Expand-Archive -Path $ahkZip -DestinationPath $toolRoot -Force

          Invoke-WebRequest -Uri "https://github.com/AutoHotkey/Ahk2Exe/releases/download/$env:AHK2EXE_TAG/$env:AHK2EXE_TAG.zip" -OutFile $ahk2exeZip
          Expand-Archive -Path $ahk2exeZip -DestinationPath $compilerDir -Force

          $ahk2exe = Join-Path $compilerDir "Ahk2Exe.exe"
          $ahkBase = Join-Path $toolRoot "AutoHotkey64.exe"

          if (-not (Test-Path $ahk2exe)) {
            throw "Ahk2Exe.exe was not extracted to $compilerDir"
          }

          if (-not (Test-Path $ahkBase)) {
            throw "AutoHotkey64.exe was not extracted to $toolRoot"
          }

          "AHK2EXE=$ahk2exe" >> $env:GITHUB_ENV
          "AHK_BASE=$ahkBase" >> $env:GITHUB_ENV

      - name: Compile with Ahk2Exe
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Write-Host "Using Ahk2Exe: $env:AHK2EXE"
          Write-Host "Using base: $env:AHK_BASE"
          & $env:AHK2EXE /in src\ExplorerUp.ahk /out dist\ExplorerUp.exe /base $env:AHK_BASE /silent verbose
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path "dist\ExplorerUp.exe")) {
            throw "dist\\ExplorerUp.exe was not created"
          }
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExplorerUp
          path: dist/ExplorerUp.exe
          if-no-files-found: error

      # タグ push 時のみ GitHub Release を作成して EXE を添付
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ExplorerUp.exe
          generate_release_notes: true
